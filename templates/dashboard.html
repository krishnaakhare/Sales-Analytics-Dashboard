<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Sales Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f0f1a; font-family: 'Segoe UI', sans-serif; color: white; }
        .sidebar {
            width: 240px; height: 100vh; position: fixed;
            background: #13131f; border-right: 1px solid rgba(124,58,237,0.2);
            padding: 25px 15px; z-index: 100;
        }
        .sidebar .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 35px; padding: 0 10px; }
        .sidebar .brand i { color: #7c3aed; font-size: 1.5rem; }
        .sidebar .brand span { font-size: 1.1rem; font-weight: 700; color: white; }
        .nav-link {
            color: #888; border-radius: 10px; padding: 11px 15px;
            margin-bottom: 5px; display: flex; align-items: center; gap: 12px;
            font-size: 0.9rem; transition: all 0.2s; text-decoration: none;
        }
        .nav-link:hover, .nav-link.active { background: rgba(124,58,237,0.15); color: #a78bfa; }
        .nav-link i { width: 18px; text-align: center; }
        .main { margin-left: 240px; padding: 30px; }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px;
        }
        .topbar h4 { font-weight: 700; color: white; }
        .topbar .user-badge {
            background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.3);
            border-radius: 20px; padding: 6px 16px; font-size: 0.85rem; color: #a78bfa;
        }
        .kpi-card {
            background: #13131f; border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px; padding: 25px; transition: all 0.3s;
        }
        .kpi-card:hover { border-color: rgba(124,58,237,0.4); transform: translateY(-3px); }
        .kpi-icon {
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
            margin-bottom: 15px;
        }
        .kpi-value { font-size: 1.6rem; font-weight: 700; color: white; }
        .kpi-label { color: #666; font-size: 0.82rem; margin-top: 4px; }
        .chart-card {
            background: #13131f; border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px; padding: 20px; margin-top: 25px;
        }
        .chart-card h6 { color: #aaa; font-size: 0.85rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .chart-card img { width: 100%; border-radius: 8px; }
        .logout-btn {
            color: #ef4444; border-radius: 10px; padding: 11px 15px;
            display: flex; align-items: center; gap: 12px;
            font-size: 0.9rem; text-decoration: none; transition: all 0.2s;
            position: absolute; bottom: 25px; left: 15px; right: 15px;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.1); color: #ef4444; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-chart-line"></i><span>SalesAnalytics</span></div>
    <a href="/dashboard" class="nav-link active"><i class="fas fa-th-large"></i> Dashboard</a>
    <a href="/products" class="nav-link"><i class="fas fa-box"></i> Products</a>
    <a href="/sales" class="nav-link"><i class="fas fa-receipt"></i> Sales</a>
    <a href="/export_csv" class="nav-link"><i class="fas fa-download"></i> Export CSV</a>
    <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">
    <div class="topbar">
        <h4><i class="fas fa-th-large me-2" style="color:#7c3aed"></i>Dashboard Overview</h4>
        <div class="user-badge"><i class="fas fa-user me-1"></i> {{ user }}</div>
    </div>

    <!-- KPI Cards -->
    <div class="row g-4">
        <div class="col-md-3">
            <div class="kpi-card">
                <div class="kpi-icon" style="background:rgba(124,58,237,0.15)">
                    <i class="fas fa-rupee-sign" style="color:#7c3aed"></i>
                </div>
                <div class="kpi-value">{{ total_sales }}</div>
                <div class="kpi-label">Total Revenue</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="kpi-card">
                <div class="kpi-icon" style="background:rgba(16,185,129,0.15)">
                    <i class="fas fa-trending-up" style="color:#10b981"></i>
                </div>
                <div class="kpi-value">{{ total_profit }}</div>
                <div class="kpi-label">Total Profit</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="kpi-card">
                <div class="kpi-icon" style="background:rgba(6,182,212,0.15)">
                    <i class="fas fa-shopping-cart" style="color:#06b6d4"></i>
                </div>
                <div class="kpi-value">{{ total_orders }}</div>
                <div class="kpi-label">Total Orders</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="kpi-card">
                <div class="kpi-icon" style="background:rgba(245,158,11,0.15)">
                    <i class="fas fa-star" style="color:#f59e0b"></i>
                </div>
                <div class="kpi-value" style="font-size:1.1rem">{{ best_product }}</div>
                <div class="kpi-label">Best Selling Product</div>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="chart-card">
        <h6>Monthly Revenue Trend</h6>
        <img src="data:image/png;base64,{{ chart1 }}" alt="Monthly Revenue">
    </div>

    <div class="row g-4 mt-1">
        <div class="col-md-6">
            <div class="chart-card">
                <h6>Sales by Category</h6>
                <img src="data:image/png;base64,{{ chart2 }}" alt="Category">
            </div>
        </div>
        <div class="col-md-6">
            <div class="chart-card">
                <h6>Revenue by Region</h6>
                <img src="data:image/png;base64,{{ chart3 }}" alt="Region">
            </div>
        </div>
    </div>
</div>
</body>
</html>
