<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales | Sales Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f1a; font-family: 'Segoe UI', sans-serif; color: white; }
        .sidebar {
            width: 240px; height: 100vh; position: fixed;
            background: #13131f; border-right: 1px solid rgba(124,58,237,0.2);
            padding: 25px 15px;
        }
        .sidebar .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 35px; padding: 0 10px; }
        .sidebar .brand i { color: #7c3aed; font-size: 1.5rem; }
        .sidebar .brand span { font-size: 1.1rem; font-weight: 700; }
        .nav-link {
            color: #888; border-radius: 10px; padding: 11px 15px;
            margin-bottom: 5px; display: flex; align-items: center; gap: 12px;
            font-size: 0.9rem; transition: all 0.2s; text-decoration: none;
        }
        .nav-link:hover, .nav-link.active { background: rgba(124,58,237,0.15); color: #a78bfa; }
        .main { margin-left: 240px; padding: 30px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .page-header h4 { font-weight: 700; }
        .btn-purple {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            border: none; color: white; border-radius: 10px;
            padding: 10px 20px; font-size: 0.9rem; cursor: pointer;
        }
        .card-dark {
            background: #13131f; border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px; padding: 25px;
        }
        table { width: 100%; border-collapse: collapse; }
        th { color: #666; font-size: 0.8rem; text-transform: uppercase;
             letter-spacing: 1px; padding: 12px 15px; border-bottom: 1px solid #1e1e30; }
        td { padding: 14px 15px; color: #ccc; font-size: 0.9rem;
             border-bottom: 1px solid #1a1a28; }
        tr:hover td { background: rgba(124,58,237,0.05); }
        .modal-content { background: #13131f; border: 1px solid rgba(124,58,237,0.3); border-radius: 16px; }
        .modal-header { border-bottom: 1px solid #1e1e30; }
        .modal-title { color: white; }
        .form-control, .form-select {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(124,58,237,0.2);
            color: white; border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.08); border-color: #7c3aed;
            color: white; box-shadow: none;
        }
        .form-label { color: #aaa; font-size: 0.85rem; }
        .logout-btn {
            color: #ef4444; border-radius: 10px; padding: 11px 15px;
            display: flex; align-items: center; gap: 12px;
            font-size: 0.9rem; text-decoration: none;
            position: absolute; bottom: 25px; left: 15px; right: 15px;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.1); color: #ef4444; }
        .total-badge { color: #10b981; font-weight: 600; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-chart-line"></i><span>SalesAnalytics</span></div>
    <a href="/dashboard" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
    <a href="/products" class="nav-link"><i class="fas fa-box"></i> Products</a>
    <a href="/sales" class="nav-link active"><i class="fas fa-receipt"></i> Sales</a>
    <a href="/export_csv" class="nav-link"><i class="fas fa-download"></i> Export CSV</a>
    <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">
    <div class="page-header">
        <h4><i class="fas fa-receipt me-2" style="color:#7c3aed"></i>Sales Records</h4>
        <button class="btn-purple" data-bs-toggle="modal" data-bs-target="#saleModal">
            <i class="fas fa-plus me-2"></i>Add Sale
        </button>
    </div>

    <div class="card-dark">
        <table>
            <thead>
                <tr>
                    <th>#</th><th>Date</th><th>Product</th><th>Customer</th>
                    <th>Qty</th><th>Unit Price</th><th>Total</th>
                </tr>
            </thead>
            <tbody>
                {% for s in sales %}
                <tr>
                    <td>{{ s[0] }}</td>
                    <td>{{ s[1] }}</td>
                    <td>{{ s[2] }}</td>
                    <td>{{ s[3] }}</td>
                    <td>{{ s[4] }}</td>
                    <td>₹{{ "{:,.0f}".format(s[5]) }}</td>
                    <td class="total-badge">₹{{ "{:,.0f}".format(s[6]) }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Add Sale Modal -->
<div class="modal fade" id="saleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Sale</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="/add_sale">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Product</label>
                        <select name="product_id" class="form-select">
                            {% for p in products %}
                            <option value="{{ p[0] }}">{{ p[1] }} (₹{{ p[3] }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Customer</label>
                        <select name="customer_id" class="form-select">
                            {% for c in customers %}
                            <option value="{{ c[0] }}">{{ c[1] }} - {{ c[2] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number" name="quantity" class="form-control" min="1" required>
                    </div>
                </div>
                <div class="modal-footer" style="border-top:1px solid #1e1e30">
                    <button type="submit" class="btn-purple">Add Sale</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
